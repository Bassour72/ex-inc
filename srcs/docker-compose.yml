services:

  
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb:inception
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -u root -p$$(cat /run/secrets/db_root_password)"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USER=${SQL_USER}
    secrets:
      - db_root_password
      - db_password
    networks:
      - inception
    volumes:
      - db-data:/var/lib/mysql
    restart: on-failure
  

  adminer:
    container_name: adminer
    build: ./requirements/bonus/Adminer
    image: adminer:inception
    depends_on:
      - mariadb
    networks:
      - inception
    restart: on-failure

  redis:
    container_name: redis
    build:
      context: ./requirements/bonus/redis 
      dockerfile: Dockerfile
    image: redis:inception
    networks:
      - inception
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 60s

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress:inception
    environment:
      - WP_URL=${WP_URL}
      - WP_TITLE=${WP_TITLE}
      - WP_ADMIN_USER=${WP_ADMIN_USER}
      - WP_ADMIN_EMAIL=${WP_ADMIN_EMAIL}
      - WP_USER=${WP_USER}
      - WP_USER_EMAIL=${WP_USER_EMAIL}
      - SQL_DATABASE=${SQL_DATABASE}
      - SQL_USER=${SQL_USER}
      - FTP_USER=${FTP_USER}
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
      - ftp_user_password
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inception
    volumes:
      - wp-data:/var/www/wordpress
    restart: on-failure


  ftp:
    container_name: ftp
    build:
      context: ./requirements/bonus/ftp
      dockerfile: Dockerfile
    image: ftp:inception
    environment:
      - FTP_USER=${FTP_USER}
    secrets:
      - ftp_user_password
    depends_on:
      - wordpress
    ports:
      - "21:21"
      - "30000-30050:30000-30050"
    volumes:
      - wp-data:/var/www/wordpress
    networks:
      - inception
    restart: on-failure


  static_site:
    container_name: static_site
    build:
      context: ./requirements/bonus/static_site
      dockerfile: Dockerfile
    image: static_site:inception
    networks:
      - inception
    restart: on-failure

  cadvisor:
    container_name: cadvisor
    build:
      context: ./requirements/bonus/cAdvisor
      dockerfile: Dockerfile
    image: cadvisor:inception
    networks:
      - inception

    privileged: true

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: on-failure


  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx:inception
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - wp-data:/var/www/wordpress
    restart: on-failure 
  

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password: 
    file: ../secrets/wp_user_password.txt
  ftp_user_password:
    file: ../secrets/ftp_user_password.txt

networks:
  inception:
    driver: bridge

volumes:
  db-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/mariadb'

  wp-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: '/home/${USER}/data/wordpress'
  
