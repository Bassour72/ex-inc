background=NO
pam_service_name=vsftpd
local_root=/var/www/wordpress
anon_root=/var/www/wordpress
user_sub_token=$USER
listen=YES
listen_ipv6=NO
listen_address=0.0.0.0
listen_port=21
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
chroot_local_user=YES
allow_writeable_chroot=YES
seccomp_sandbox=NO
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30050
pasv_promiscuous=YES
secure_chroot_dir=/var/run/vsftpd/empty
